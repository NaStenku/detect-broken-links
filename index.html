<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Quick setup guide for pinning and opening the Detect Broken Links Chrome extension.">
    <title>Detect Broken Links - Quick Setup</title>
    <base href="/detect-broken-links/">
    <link rel="icon" href="icons/icon-32.png" sizes="32x32">
    <link rel="stylesheet" href="welcome.css">
    <script
        defer
        src="https://cloud.umami.is/script.js"
        data-website-id="d772cce4-d753-45ee-8d08-f19a9645a72d"
        data-domains="nastenku.github.io"
        data-tag="detect-broken-links"
    ></script>
</head>
<body>
    <main class="page-shell">
        <header class="intro">
            <h1>Keep the extension one click away</h1>
        </header>

        <section class="steps" aria-label="Detect Broken Links quick setup steps">
            <article class="step-card">
                <img src="marketing/tutorial-1-cropped.png" alt="Chrome Extensions menu with Detect Broken Links and the pin control highlighted.">
                <div class="step-copy">
                    <ol class="mini-steps" start="1">
                        <li>Click the puzzle icon in the Chrome toolbar.</li>
                        <li>Find Detect Broken Links and click the pin icon.</li>
                    </ol>
                </div>
            </article>

            <article class="step-card">
                <img src="marketing/tutorial-2-cropped.png" alt="Detect Broken Links pinned in the Chrome toolbar with the side panel Start Scan button highlighted.">
                <div class="step-copy">
                    <ol class="mini-steps" start="3">
                        <li>Click the Detect Broken Links icon next to the address bar.</li>
                        <li>Press Start Scan in the side panel.</li>
                    </ol>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
